<div class="register-page">

  <div class="register-card">

    <h1>Regisztráció</h1>

    <input
      type="text"
      placeholder="Felhasználónév"
      [(ngModel)]="username">

    <input
      type="email"
      placeholder="Email cím"
      [(ngModel)]="email">

    <input
      type="password"
      placeholder="Jelszó"
      [(ngModel)]="password">

    <button (click)="register()">
      Regisztráció
    </button>

    <div class="login-link">
      <a routerLink="/">
        Már van fiókom
      </a>
    </div>

  </div>

</div>
