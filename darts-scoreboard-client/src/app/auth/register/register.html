<div class="auth-page">

  <div class="auth-card">

    <div class="auth-switcher-wrapper">
      <app-language-switcher></app-language-switcher>
    </div>

    <h1>{{ 'AUTH.REGISTER' | translate }}</h1>

    <input
      type="text"
      [placeholder]="'AUTH.USERNAME' | translate"
      [(ngModel)]="username">

    <input
      type="email"
      [placeholder]="'AUTH.EMAIL' | translate"
      [(ngModel)]="email">

    <input
      type="password"
      [placeholder]="'AUTH.PASSWORD' | translate"
      [(ngModel)]="password">

    <button
      type="button"
      [disabled]="isRegistering"
      (click)="register()">
      @if (isRegistering) {
        {{ 'AUTH.REGISTER_LOADING' | translate }}
      } @else {
        {{ 'AUTH.REGISTER' | translate }}
      }
    </button>

    <div class="login-link">
      <a routerLink="/">
        {{ 'AUTH.ALREADY_HAVE_ACCOUNT' | translate }}
      </a>
    </div>

  </div>

</div>
