<div class="auth-page">

  <div class="auth-card">

    <div class="auth-switcher-wrapper">
      <app-language-switcher></app-language-switcher>
    </div>

    <h1>{{ 'AUTH.RESET_PASSWORD_TITLE' | translate }}</h1>

    <input
      [(ngModel)]="email"
      type="email"
      [placeholder]="'AUTH.EMAIL' | translate">

    <input
      [(ngModel)]="newPassword"
      type="password"
      [placeholder]="'AUTH.NEW_PASSWORD' | translate">

    <input
      [(ngModel)]="confirmPassword"
      type="password"
      [placeholder]="'AUTH.CONFIRM_NEW_PASSWORD' | translate">

    <button
      type="button"
      [disabled]="isSubmitting"
      (click)="resetPassword()">
      @if (isSubmitting) {
        {{ 'AUTH.SAVE_LOADING' | translate }}
      } @else {
        {{ 'AUTH.CHANGE_PASSWORD' | translate }}
      }
    </button>

    @if (message) {
      <p class="auth-message">
        {{ message }}
      </p>
    }

    <a
      class="auth-link"
      routerLink="/">
      {{ 'AUTH.BACK_TO_LOGIN' | translate }}
    </a>

  </div>

</div>
