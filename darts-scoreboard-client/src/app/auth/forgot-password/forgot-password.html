<div class="auth-page">

  <div class="auth-card">

    <h1>Elfelejtett jelszó</h1>

    <input
      [(ngModel)]="email"
      type="email"
      placeholder="Email cím">

    <button
      type="button"
      [disabled]="isSubmitting"
      (click)="send()">
      @if (isSubmitting) {
        Küldés...
      } @else {
        Küldés
      }
    </button>

    @if (message) {
      <p class="auth-message">
        {{ message }}
      </p>
    }

    <a
      class="auth-link"
      routerLink="/">
      Vissza a bejelentkezéshez
    </a>

  </div>

</div>
